# Blueprint Render — Patagonia Austral (PWA de turismo, proyecto propio)
# Despliega SOLO el backend (Laravel + Filament) como web service Docker.
# - La base de datos es EXTERNA: Postgres gestionado en Neon (neon.tech, free).
#   Se conecta vía DB_URL (secreto del dashboard). Así no chocamos con el límite
#   de una sola Postgres free por cuenta de Render (la ocupa el proyecto Cochrane).
# - El frontend (PWA) va en Netlify (netlify.toml). Ver DEPLOY.md.
#
# OJO: el nombre del servicio es propio de ESTE proyecto y no choca con los del
# proyecto Cochrane (cochrane-turismo-*), que sigue en la misma cuenta sin conflicto.
services:
  - type: web
    name: patagonia-austral-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_TIMEZONE
        value: America/Santiago
      - key: APP_DEBUG
        value: "false"
      # Clave de la app — SECRETO: se ingresa en el dashboard de Render al aplicar
      # el blueprint (sync: false). Generar con: php artisan key:generate --show
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      # Connection string de Neon — SECRETO del dashboard (sync: false).
      # Formato: postgresql://usuario:clave@host.neon.tech/patagonia_austral?sslmode=require
      - key: DB_URL
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      # Origen permitido por CORS = URL pública de la PWA en Netlify.
      # Ajustar cuando exista el sitio real (o si se usa dominio propio).
      - key: FRONTEND_URL
        value: https://patagonia-austral.netlify.app
      # Web Push (VAPID). Par de claves PROPIO de este proyecto (no reutilizar las
      # de Cochrane; cambiar el par invalida las suscripciones ya hechas).
      # La pública no es secreta (viaja al navegador); la privada se ingresa en el
      # dashboard de Render al aplicar el blueprint (sync: false).
      - key: VAPID_SUBJECT
        value: mailto:jp.devtravel@gmail.com
      - key: VAPID_PUBLIC_KEY
        value: BHXyuwrehAa5BbAxa02Q76oIza-obs5baPkAl05sjiKF-wB8YaHDxflkFG4l0NwRrEnHWnAV6FLvApRXr2l2-iE
      - key: VAPID_PRIVATE_KEY
        sync: false
