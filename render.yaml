# Blueprint Render — Patagonia Austral (PWA de turismo, proyecto propio)
# Despliega el backend: 1 web service en contenedor Docker + 1 PostgreSQL gestionado.
# El frontend (PWA) se despliega aparte como Static Site en Render (ver DEPLOY.md).
#
# OJO: los nombres de servicio son propios de ESTE proyecto y no chocan con los
# del proyecto Cochrane (cochrane-turismo-api / cochrane-turismo-db), que puede
# seguir desplegado en la misma cuenta sin conflicto.
services:
  - type: web
    name: patagonia-austral-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_TIMEZONE
        value: America/Santiago
      - key: APP_DEBUG
        value: "false"
      # Clave de la app — SECRETO: se ingresa en el dashboard de Render al aplicar
      # el blueprint (sync: false). Generar con: php artisan key:generate --show
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      # Cadena de conexión inyectada desde la base Postgres de abajo
      - key: DB_URL
        fromDatabase:
          name: patagonia-austral-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      # Origen permitido por CORS (la URL pública de la PWA). Ajustar si cambia el dominio.
      - key: FRONTEND_URL
        value: https://patagonia-austral.onrender.com
      # Web Push (VAPID). Par de claves PROPIO de este proyecto (no reutilizar las
      # de Cochrane; cambiar el par invalida las suscripciones ya hechas).
      # La pública no es secreta (viaja al navegador); la privada se ingresa en el
      # dashboard de Render al aplicar el blueprint (sync: false).
      - key: VAPID_SUBJECT
        value: mailto:jp.devtravel@gmail.com
      - key: VAPID_PUBLIC_KEY
        value: BHXyuwrehAa5BbAxa02Q76oIza-obs5baPkAl05sjiKF-wB8YaHDxflkFG4l0NwRrEnHWnAV6FLvApRXr2l2-iE
      - key: VAPID_PRIVATE_KEY
        sync: false

databases:
  - name: patagonia-austral-db
    databaseName: patagonia_austral
    user: patagonia
    plan: free
