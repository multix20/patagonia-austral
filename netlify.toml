# Despliegue continuo Netlify — Patagonia Austral (frontend PWA)
# Variables del sitio: VITE_API_URL + VITE_VAPID_PUBLIC_KEY (ver DEPLOY.md)
[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA: todas las rutas sirven index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
