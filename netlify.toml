# Despliegue continuo Netlify — Patagonia Austral (alternativa opcional;
# el despliegue principal del frontend es un Static Site en Render, ver DEPLOY.md)
[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA: todas las rutas sirven index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
